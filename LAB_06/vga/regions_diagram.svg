<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420">
  <!-- page background -->
  <rect x="0" y="0" width="640" height="420" fill="#0f172a"/>
  <!-- whole frame -->
  <rect x="40" y="30" width="560" height="340" fill="#1f2937" stroke="#475569"/>
  <!-- vertical sync band (rows) -->
  <rect x="40" y="300" width="560" height="20" fill="#831843" opacity="0.6"/>
  <!-- horizontal sync band (cols) -->
  <rect x="470" y="30" width="60" height="340" fill="#831843" opacity="0.6"/>
  <!-- visible region -->
  <rect x="60" y="50" width="360" height="220" fill="#065f46" stroke="#34d399" stroke-width="2"/>
  <text x="240" y="165" text-anchor="middle" fill="#d1fae5" font-size="15" font-weight="bold" font-family="sans-serif">VISIBLE</text>
  <text x="240" y="188" text-anchor="middle" fill="#d1fae5" font-size="12" font-family="sans-serif">800 &#215; 600 — output real color here</text>

  <!-- coordinate labels -->
  <text x="60" y="44" fill="#94a3b8" font-size="10" font-family="sans-serif">(0,0)</text>
  <text x="420" y="44" fill="#94a3b8" font-size="10" text-anchor="end" font-family="sans-serif">hcount=799</text>
  <text x="48" y="275" fill="#94a3b8" font-size="10" font-family="sans-serif">vcount=599</text>

  <!-- region annotations -->
  <text x="445" y="160" fill="#cbd5e1" font-size="10" text-anchor="middle" transform="rotate(-90 445 160)" font-family="sans-serif">H front porch</text>
  <text x="500" y="160" fill="#fbcfe8" font-size="10" text-anchor="middle" transform="rotate(-90 500 160)" font-family="sans-serif">H sync</text>
  <text x="565" y="160" fill="#cbd5e1" font-size="10" text-anchor="middle" transform="rotate(-90 565 160)" font-family="sans-serif">H back porch</text>

  <text x="240" y="290" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="sans-serif">V front porch</text>
  <text x="240" y="314" fill="#fbcfe8" font-size="10" text-anchor="middle" font-family="sans-serif">V sync</text>
  <text x="240" y="350" fill="#cbd5e1" font-size="10" text-anchor="middle" font-family="sans-serif">V back porch</text>

  <text x="320" y="400" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">Whole frame = 1040 &#215; 666. Anything outside the green box must be black.</text>

  <!-- MARKER: bottom-right corner of the visible (green) box at (420,270) -->
  <g stroke="#ef4444" stroke-width="4" stroke-linecap="round">
    <line x1="408" y1="258" x2="432" y2="282"/>
    <line x1="432" y1="258" x2="408" y2="282"/>
  </g>
</svg>
